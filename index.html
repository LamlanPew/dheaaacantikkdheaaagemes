<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Untukmu 💗</title>
<style>
  :root{
    --cream:#FFF6F1;
    --blush:#FFD6E2;
    --rose:#E8607A;
    --plum:#5A3A52;
    --lavender:#D8C3F0;
    --gold:#F4C95D;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  html,body{
    width:100%; height:100%;
    font-family:'Quicksand', 'Segoe UI', sans-serif;
    background: linear-gradient(160deg, var(--cream), var(--blush));
    color:var(--plum);
    overflow-x:hidden;
  }
  @import url('https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600;700&family=Quicksand:wght@400;500;700&display=swap');

  /* ===== PARTIKEL LOVE & BUNGA ===== */
  #particles{
    position:fixed; inset:0; pointer-events:none; z-index:0; overflow:hidden;
  }
  .particle{
    position:absolute; top:-40px; font-size:22px; opacity:.8;
    animation: fall linear forwards;
    user-select:none;
  }
  @keyframes fall{
    to{ transform: translateY(110vh) rotate(360deg); opacity:0; }
  }

  /* ===== LAYOUT UMUM ===== */
  .screen{
    position:relative; z-index:1;
    min-height:100vh; width:100%;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    padding:24px; text-align:center;
    display:none;
  }
  .screen.active{ display:flex; animation: fadeIn .8s ease; }
  @keyframes fadeIn{ from{opacity:0; transform:translateY(15px);} to{opacity:1; transform:translateY(0);} }

  h1{
    font-family:'Dancing Script', cursive;
    font-size:2.6rem; color:var(--rose);
    margin-bottom:10px;
    text-shadow: 0 2px 10px rgba(232,96,122,.25);
  }
  p.sub{ font-size:.95rem; color:var(--plum); opacity:.8; margin-bottom:20px; max-width:340px; }

  /* ===== PROGRESS DOTS ===== */
  #progress-dots{
    position:fixed; top:18px; left:50%; transform:translateX(-50%);
    display:flex; gap:8px; z-index:60;
  }
  #progress-dots .dot{
    width:8px; height:8px; border-radius:50%;
    background:rgba(232,96,122,.25);
    transition: all .3s ease;
  }
  #progress-dots .dot.active{ background:var(--rose); width:22px; border-radius:6px; }

  /* ===== TOMBOL ===== */
  .btn{
    border:none; border-radius:999px;
    padding:14px 36px; font-size:1.05rem; font-weight:700;
    font-family:'Quicksand', sans-serif;
    cursor:pointer; transition: transform .2s ease, background .2s ease, opacity .2s ease;
    box-shadow:0 6px 16px rgba(0,0,0,.08);
  }
  .btn-yes{ background:var(--rose); color:#fff; position:relative; }
  .btn-yes:hover{ background:#d44a64; }
  .btn-yes::after{
    content:""; position:absolute; inset:-6px; border-radius:999px;
    border:2px solid rgba(232,96,122,.4); opacity:0;
    animation: ring 1.8s ease-out infinite;
  }
  @keyframes ring{
    0%{ opacity:.6; transform:scale(1); }
    100%{ opacity:0; transform:scale(1.25); }
  }
  .btn-no{ background:#fff; color:var(--plum); border:2px solid var(--lavender); position:relative; }

  .btn-row{
    display:flex; gap:18px; margin-top:34px; align-items:center; justify-content:center;
    flex-wrap:wrap; position:relative; min-height:70px; width:100%;
  }

  #question-emoji{ font-size:4rem; margin-bottom:6px; animation: pulse 1.6s infinite; }
  @keyframes pulse{ 0%,100%{transform:scale(1);} 50%{transform:scale(1.12);} }

  #ask-photo{
    width:150px; height:150px; border-radius:50%; object-fit:cover;
    border:5px solid #fff; box-shadow:0 12px 26px rgba(232,96,122,.3);
    margin-bottom:18px;
  }

  .footer-note{ margin-top:26px; font-size:.8rem; opacity:.65; max-width:320px; z-index:5; position:relative; min-height:16px; }

  /* ===== GALERI BUBBLE ===== */
  #gallery-screen{
    overflow:hidden; padding-top:70px; padding-bottom:130px;
  }
  #gallery-screen h1{ position:relative; z-index:5; margin-bottom:4px;}
  #bubble-field{
    position:relative; width:100%; max-width:480px; height:70vh; min-height:520px;
  }
  .bubble{
    position:absolute;
    border-radius:50%;
    overflow:hidden;
    box-shadow:0 10px 25px rgba(232,96,122,.3), 0 0 0 6px rgba(255,255,255,.7);
    animation: floatBubble 7s ease-in-out infinite;
    cursor:pointer;
    background:#fff;
    transition: transform .25s ease, box-shadow .25s ease;
  }
  .bubble:active{ transform: scale(0.92); }
  .bubble .badge{
    position:absolute; bottom:6px; right:6px; font-size:14px;
    background:rgba(255,255,255,.85); border-radius:50%;
    width:22px; height:22px; display:flex; align-items:center; justify-content:center;
    box-shadow:0 2px 6px rgba(0,0,0,.15);
  }
  .bubble img, .bubble video{
    width:100%; height:100%; object-fit:cover; display:block;
  }
  @keyframes floatBubble{
    0%,100%{ transform: translateY(0px) translateX(0px); }
    50%{ transform: translateY(-22px) translateX(8px); }
  }

  .gallery-cta{
    margin-top:10px; font-size:.85rem; color:var(--plum); opacity:.75;
  }

  /* overlay deskripsi saat bubble ditekan */
  #bubble-modal{
    position:fixed; inset:0; background:rgba(90,58,82,.55);
    display:none; align-items:center; justify-content:center; z-index:50;
    padding:20px;
    backdrop-filter: blur(3px);
  }
  #bubble-modal.active{ display:flex; animation: fadeIn .3s ease; }
  #bubble-modal .card{
    background:#fff; border-radius:22px; padding:18px; max-width:340px; width:100%;
    text-align:center; box-shadow:0 20px 50px rgba(0,0,0,.25);
    animation: popIn .35s ease;
  }
  @keyframes popIn{ from{ transform:scale(.85); opacity:0; } to{ transform:scale(1); opacity:1; } }
  #bubble-modal .card img, #bubble-modal .card video{
    width:100%; border-radius:16px; max-height:320px; object-fit:cover; margin-bottom:12px;
  }
  #bubble-modal .card p{ font-size:.95rem; color:var(--plum); }
  #bubble-modal .close-btn{
    margin-top:14px; background:var(--rose); color:#fff; border:none; border-radius:999px;
    padding:10px 26px; font-weight:700; cursor:pointer;
  }

  /* heart burst saat bubble ditekan */
  .heart-burst{
    position:fixed; pointer-events:none; z-index:55; font-size:20px;
    animation: burst .9s ease-out forwards;
  }
  @keyframes burst{
    0%{ transform: translate(0,0) scale(0.6); opacity:1; }
    100%{ transform: translate(var(--dx), var(--dy)) scale(1.4); opacity:0; }
  }

  /* ===== SURAT CINTA ===== */
  #letter-screen{ padding-top:60px; }
  #letter-card{
    background:#fff; border-radius:24px; padding:32px 26px; max-width:380px; width:100%;
    box-shadow:0 16px 40px rgba(232,96,122,.22); position:relative;
  }
  #letter-card::before{
    content:"💌"; font-size:2.2rem; display:block; margin-bottom:8px;
  }
  #letter-text{
    font-size:1rem; line-height:1.7; color:var(--plum); text-align:left;
    white-space:pre-wrap; min-height:180px;
  }
  #letter-text .cursor{
    display:inline-block; width:2px; background:var(--rose); margin-left:2px;
    animation: blink 1s step-end infinite;
  }
  @keyframes blink{ 50%{ opacity:0; } }

  /* ===== MUSIK ===== */
  #music-toggle{
    position:fixed; bottom:18px; right:18px; z-index:60;
    width:54px; height:54px; border-radius:50%;
    background:var(--rose); color:#fff; border:none;
    font-size:1.5rem; cursor:pointer;
    box-shadow:0 8px 20px rgba(232,96,122,.4);
    display:flex; align-items:center; justify-content:center;
  }
  #music-toggle.spinning{ animation: spin 4s linear infinite; }
  @keyframes spin{ from{ transform:rotate(0deg); } to{ transform:rotate(360deg); } }

  .nav-back{
    position:fixed; top:16px; left:16px; z-index:60;
    background:rgba(255,255,255,.85); border:none; border-radius:999px;
    padding:8px 16px; font-weight:700; color:var(--plum); cursor:pointer;
    box-shadow:0 4px 12px rgba(0,0,0,.08); font-size:.85rem;
    display:none;
  }
  .nav-back.show{ display:inline-flex; align-items:center; gap:4px; }
</style>
</head>
<body>

<div id="particles"></div>
<audio id="bg-music" loop></audio>
<button id="music-toggle" title="Putar / Hentikan musik">🎵</button>
<button class="nav-back" id="nav-back">← kembali</button>
<div id="progress-dots">
  <div class="dot active" data-screen="question-screen"></div>
  <div class="dot" data-screen="gallery-screen"></div>
  <div class="dot" data-screen="letter-screen"></div>
</div>

<!-- ================= SCREEN 1 : NEMBAK ================= -->
<section id="question-screen" class="screen active">
  <img id="ask-photo" src="https://res.cloudinary.com/dpktfiwxj/image/upload/v1784336236/IMG-20260717-WA0053_mhxmg6.jpg" alt="foto kamu">
  <div id="question-emoji">🥺💕</div>
  <h1>Mau gak jadi pacar aku?</h1>
  <p class="sub" id="question-text"Mauu gaaa sayaanggg"</p>
  <div class="btn-row">
    <button class="btn btn-yes" id="btn-yes">Ya, mau! 💖</button>
    <button class="btn btn-no" id="btn-no">Engga deh</button>
  </div>
  <p class="footer-note" id="attempt-note"></p>
</section>

<!-- ================= SCREEN 2 : GALERI ================= -->
<section id="gallery-screen" class="screen">
  <h1>Yeay, makasih ya 🌸</h1>
  <p class="sub"> SUMPAAHHH INI ISINYAA FOTO FFOTO CAKEEPPP</p>
  <div id="bubble-field"></div>
  <p class="gallery-cta">udah liat semua? <span id="letter-link" style="color:var(--rose); font-weight:700; cursor:pointer; text-decoration:underline;">baca surat buat kamu →</span></p>
</section>

<!-- ================= SCREEN 3 : SURAT ================= -->
<section id="letter-screen" class="screen">
  <div id="letter-card">
    <div id="letter-text"><span class="cursor">&nbsp;</span></div>
  </div>
  <p class="footer-note">dari aku, buat kamu 💗</p>
</section>

<!-- Modal detail bubble -->
<div id="bubble-modal">
  <div class="card" id="bubble-modal-content"></div>
</div>

<script>
/* =========================================================
   1) KONFIGURASI
   ========================================================= */

const MUSIC_SRC = "https://res.cloudinary.com/dpktfiwxj/video/upload/v1784337769/audio_7702803676_4_lgvnnx.mp3";

// Galeri kenangan: foto & video
const MEMORIES = [
  {
    type: "video",
    src: "https://res.cloudinary.com/dpktfiwxj/video/upload/v1784293413/VID-20260717-WA0027_vuygjq.mp4",
    caption: ""
  },
  {
    type: "video",
    src: "https://res.cloudinary.com/dpktfiwxj/video/upload/v1784293447/VID-20260717-WA0046_r2atg8.mp4",
    caption: ""
  },
  {
    type: "video",
    src: "https://res.cloudinary.com/dpktfiwxj/video/upload/v1784336276/VID-20260717-WA0031_lyzhi8.mp4",
    caption: ""
  },
  {
    type: "video",
    src: "https://res.cloudinary.com/dpktfiwxj/video/upload/v1784293368/VID-20260717-WA0048_pjdesm.mp4",
    caption: ""
  },
  {
    type: "video",
    src: "https://res.cloudinary.com/dpktfiwxj/video/upload/v1784293451/VID-20260717-WA0049_kwnqsi.mp4",
    caption: ""
  }
];

const LETTER_TEXT = `Hai dheaaaa

Hmmzz jujur tidak percaya gak ekspek kau mau pacaran sama aku jujur beruntung banget aku kenal kamu aku aku bisa lebih dihargain.
aku disaat sekarang ini mah emang gak punya apa apa tapi aku pasti usahain semuanya buat kamu 

Makasihj nyaa udaah nerima akuu aku gak akan melunjak,
Makasih nyaa kitaa kudu betah kudu langgeng.

I Always Loving You . `;

/* =========================================================
   2) PARTIKEL LOVE & BUNGA
   ========================================================= */
const particleEls = ["💗","💖","🌸","🌷","✨","💕"];
function spawnParticle(){
  const el = document.createElement("div");
  el.className = "particle";
  el.textContent = particleEls[Math.floor(Math.random()*particleEls.length)];
  el.style.left = Math.random()*100 + "vw";
  el.style.fontSize = (16 + Math.random()*18) + "px";
  const duration = 6 + Math.random()*6;
  el.style.animationDuration = duration + "s";
  document.getElementById("particles").appendChild(el);
  setTimeout(()=> el.remove(), duration*1000);
}
setInterval(spawnParticle, 450);
for(let i=0;i<10;i++) setTimeout(spawnParticle, i*200);

/* =========================================================
   3) MUSIK
   ========================================================= */
const music = document.getElementById("bg-music");
music.src = MUSIC_SRC;
const musicBtn = document.getElementById("music-toggle");
let musicPlaying = false;
function playMusic(){
  music.play().then(()=>{
    musicPlaying = true;
    musicBtn.classList.add("spinning");
  }).catch(()=>{});
}
function pauseMusic(){
  music.pause();
  musicPlaying = false;
  musicBtn.classList.remove("spinning");
}
musicBtn.addEventListener("click", ()=>{
  if(musicPlaying){ pauseMusic(); } else { playMusic(); }
});

/* =========================================================
   4) LAYAR NEMBAK — tombol "Ya" makin besar, "Engga" kabur
   ========================================================= */
let noClicks = 0;
const btnYes = document.getElementById("btn-yes");
const btnNo = document.getElementById("btn-no");
const attemptNote = document.getElementById("attempt-note");
const btnRow = document.querySelector(".btn-row");

btnYes.addEventListener("click", ()=>{
  celebrateYes();
  setTimeout(()=> goToScreen("gallery-screen"), 900);
});

btnNo.addEventListener("click", ()=>{
  noClicks++;

  if(noClicks >= 5){
    attemptNote.textContent = "Yaudah deh, aku tunjukin sesuatu buat kamu... 💌";
    btnNo.style.display = "none";
    setTimeout(()=> goToScreen("gallery-screen"), 1200);
    return;
  }

  // tombol "Ya" makin besar & makin menarik
  const scale = 1 + noClicks * 0.22;
  btnYes.style.transform = `scale(${scale})`;
  btnYes.style.fontSize = (1.05 + noClicks*0.12) + "rem";

  // tombol "Engga" makin kecil & lari ke posisi random tiap diklik
  const shrink = Math.max(0.5, 1 - noClicks * 0.12);
  const rowRect = btnRow.getBoundingClientRect();
  const maxX = Math.max(0, rowRect.width - 110);
  const randX = (Math.random()*maxX - maxX/2);
  const randY = (Math.random()*30 - 15);
  btnNo.style.transform = `scale(${shrink}) translate(${randX}px, ${randY}px)`;
  btnNo.style.opacity = Math.max(0.45, 1 - noClicks*0.12);

  const texts = [
    "Yakin nih? Coba pikir lagi deh 🥺",
    "Beneran nggak mau? Tombol 'Ya' makin gemes lho 💗",
    "Hmm... tombol 'Engga' nya jadi susah dipencet ya~ 👀",
    "Tinggal sedikit lagi nih buat liat surprise nya 💌"
  ];
  document.getElementById("question-text").textContent = texts[Math.min(noClicks-1, texts.length-1)];
  attemptNote.textContent = `Percobaan ke-${noClicks} dari 5`;
});

function celebrateYes(){
  // heart burst dari tengah layar
  const rect = btnYes.getBoundingClientRect();
  for(let i=0;i<18;i++){
    burstHeartAt(rect.left + rect.width/2, rect.top + rect.height/2);
  }
}

/* =========================================================
   5) GALERI BUBBLE
   ========================================================= */
function buildGallery(){
  const field = document.getElementById("bubble-field");
  field.innerHTML = "";
  const fieldW = field.clientWidth || 320;
  const fieldH = field.clientHeight || 520;

  MEMORIES.forEach((item, i)=>{
    const size = 92 + Math.random()*64; // 92px - 156px
    const bubble = document.createElement("div");
    bubble.className = "bubble";
    bubble.style.width = size + "px";
    bubble.style.height = size + "px";
    bubble.style.left = Math.random()*(fieldW - size) + "px";
    bubble.style.top = Math.random()*(fieldH - size) + "px";
    bubble.style.animationDelay = (Math.random()*4) + "s";
    bubble.style.animationDuration = (5 + Math.random()*4) + "s";

    if(item.type === "image"){
      bubble.innerHTML = `<img src="${item.src}" alt="kenangan ${i+1}">`;
    } else {
      bubble.innerHTML = `<video src="${item.src}" muted loop autoplay playsinline></video><span class="badge"></span>`;
    }

    bubble.addEventListener("click", (e)=>{
      const rect = bubble.getBoundingClientRect();
      for(let k=0;k<8;k++) burstHeartAt(rect.left+rect.width/2, rect.top+rect.height/2);
      openBubble(item);
    });
    field.appendChild(bubble);
  });
}

function openBubble(item){
  const content = document.getElementById("bubble-modal-content");
  let mediaHtml = "";
  if(item.type === "image"){
    mediaHtml = `<img src="${item.src}" alt="kenangan">`;
  } else {
    mediaHtml = `<video src="${item.src}" controls autoplay playsinline></video>`;
  }
  content.innerHTML = `${mediaHtml}<p>${item.caption}</p><button class="close-btn" onclick="closeBubble()">Tutup</button>`;
  document.getElementById("bubble-modal").classList.add("active");
}
function closeBubble(){
  document.getElementById("bubble-modal").classList.remove("active");
  document.getElementById("bubble-modal-content").innerHTML = "";
}

function burstHeartAt(x,y){
  const heart = document.createElement("div");
  heart.className = "heart-burst";
  heart.textContent = ["💗","💖","💕","✨"][Math.floor(Math.random()*4)];
  heart.style.left = x + "px";
  heart.style.top = y + "px";
  const dx = (Math.random()*160 - 80) + "px";
  const dy = (-(60 + Math.random()*100)) + "px";
  heart.style.setProperty("--dx", dx);
  heart.style.setProperty("--dy", dy);
  document.body.appendChild(heart);
  setTimeout(()=> heart.remove(), 900);
}

document.getElementById("letter-link").addEventListener("click", ()=>{
  goToScreen("letter-screen");
});

/* =========================================================
   6) SURAT CINTA — efek ketik
   ========================================================= */
let letterTyped = false;
function typeLetter(){
  if(letterTyped) return;
  letterTyped = true;
  const el = document.getElementById("letter-text");
  el.innerHTML = "";
  const cursor = document.createElement("span");
  cursor.className = "cursor";
  cursor.innerHTML = "&nbsp;";
  let i = 0;
  function step(){
    if(i <= LETTER_TEXT.length){
      el.textContent = LETTER_TEXT.slice(0, i);
      el.appendChild(cursor);
      i++;
      setTimeout(step, 28);
    }
  }
  step();
}

/* =========================================================
   7) NAVIGASI ANTAR SCREEN
   ========================================================= */
const SCREEN_ORDER = ["question-screen", "gallery-screen", "letter-screen"];
function goToScreen(id){
  document.querySelectorAll(".screen").forEach(s=> s.classList.remove("active"));
  document.getElementById(id).classList.add("active");

  document.querySelectorAll("#progress-dots .dot").forEach(d=>{
    d.classList.toggle("active", d.dataset.screen === id);
  });

  const navBack = document.getElementById("nav-back");
  navBack.classList.toggle("show", id !== "question-screen");

  if(id === "gallery-screen"){
    buildGallery();
    if(!musicPlaying) playMusic();
  }
  if(id === "letter-screen"){
    typeLetter();
  }
}

document.getElementById("nav-back").addEventListener("click", ()=>{
  const current = SCREEN_ORDER.find(id => document.getElementById(id).classList.contains("active"));
  const idx = SCREEN_ORDER.indexOf(current);
  if(idx > 0) goToScreen(SCREEN_ORDER[idx-1]);
});
</script>

</body>
</html>
